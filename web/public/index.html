<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>SON OF ANTON · WEB</title>
  <link rel="icon" href="/assets/favicon.svg?v=5" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/styles.css?v=5">
  <link rel="stylesheet" href="/assets/sidebar.css?v=5">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <script src="/_config.js"></script>
</head>
<body>
  <div id="boot" class="boot">
    <div class="boot-grid"></div>
    <div class="boot-inner">
      <h1 class="boot-title">SON OF ANTON</h1>
      <p class="boot-sub" data-i18n="brand.sub">WEB TERMINAL · PROTOCOL v1</p>
      <p class="boot-status" id="boot-status" data-i18n="boot.negotiating">negotiating session…</p>
    </div>
  </div>

  <div id="shell" class="shell hidden">
    <header class="topbar">
      <div class="brand">SON OF ANTON · WEB</div>
      <div class="tabs" id="tabs"></div>
      <div class="topbar-actions">
        <select id="lang" class="lang-select" aria-label="Language"></select>
        <a id="release-link" class="release-btn" href="https://github.com/SimonSaysGiveMeSmile/SoA-Web/releases" target="_blank" rel="noopener" data-i18n="topbar.release" data-i18n-title="topbar.release_title" title="Download latest release">⬇ GET</a>
        <button id="toggle-sidebar" data-i18n="topbar.sidebar" data-i18n-title="topbar.sidebar_title" title="Toggle sidebar (Ctrl+Shift+B)">◨ SIDE</button>
        <button id="toggle-audio" data-i18n="topbar.audio_on" data-i18n-title="topbar.audio_title" title="Mute / unmute sound FX" data-state="on">♪ FX</button>
        <button id="new-tab" data-i18n="topbar.new_tab" data-i18n-title="topbar.new_tab_title" title="New tab (Ctrl+Shift+T)">＋ TAB</button>
      </div>
    </header>
    <main class="stage">
      <div class="scanline"></div>
      <div id="terms" class="terms"></div>
      <aside id="sidebar" class="sidebar"></aside>
      <div class="status-bar">
        <span id="status-session">—</span>
        <span id="status-tabs" data-i18n="status.tabs_other" data-i18n-vars='{"n":0}'>0 tabs</span>
        <span id="status-conn" data-i18n="status.disconnected">disconnected</span>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script type="module" src="/assets/app.js?v=5"></script>
</body>
</html>
